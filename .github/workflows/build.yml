name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Regenerate Gradle wrapper
        run: |
          mkdir -p /tmp/wrapper-gen
          cd /tmp/wrapper-gen
          gradle wrapper --gradle-version 8.9
          cp gradlew gradlew.bat $GITHUB_WORKSPACE/
          mkdir -p $GITHUB_WORKSPACE/gradle/wrapper
          cp gradle/wrapper/gradle-wrapper.jar $GITHUB_WORKSPACE/gradle/wrapper/

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
